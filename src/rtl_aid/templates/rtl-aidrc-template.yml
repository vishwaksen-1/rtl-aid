# rtldoc configuration
# Generated by: rtldoc --init-workflow
#
# This file configures rtldoc (Verilog documentation generator) and rtllint (linting).
# CLI arguments always override values in this file.
#
# Supported formats: YAML 1.2

# rtldoc: Documentation generation settings
rtldoc:
  # Directories to recursively scan for Verilog files (required for --dir mode)
  # dir:
  #   - src/
  #   - rtl/

  # Specific Verilog files to parse (mutually exclusive with 'dir')
  # file:
  #   - src/module.v
  #   - rtl/subsystem.v

  # Output directory for generated markdown docs
  out: temp/docs/modules

  # Verbosity level: 0 (silent), 1 (show changes), 2 (show diffs)
  verbose: 0

  # CI mode: fail (exit 1) on issues like missing docs or invalid structures
  ci: false

  # Print error messages to stdout (in addition to error log file)
  print_errors: false

  # Generate dependency graph as JSON
  json_graph: false

  # File path to write/update JSON graph to
  # json_graph_file: docs/graph.json

  # Directories or patterns to exclude from scanning
  # exclude:
  #   - src/testbench/
  #   - src/sim/

  # Print errors for export_dot handling (optional)
  # export_dot: docs/graph.dot

  # Custom functions configuration for parameter evaluation (optional)
  # Uses packaged functions.yaml by default; override to add custom $functions
  # functions_config: config/custom-functions.yaml

  # Show what would be written without modifying files
  dry_run: false

# rtllint: Linting settings
rtllint:
  # Verilog files to lint
  # file:
  #   - src/module.v

  # Include directories to pass to verilator (-I flag)
  # include:
  #   - include/
  #   - common/

  # Verbosity: print full verilator output
  verbose: false

  # Show issues without modifying files
  dry_run: false
